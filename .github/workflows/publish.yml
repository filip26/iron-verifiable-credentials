name: Publish to the Maven Central

on:
  workflow_dispatch:
    inputs:
      workingDir:
        description: "Folder to use as working directory (e.g. '.' or 'submodule')"
        required: true
        default: "."
          
jobs:
  publish:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: CENTRAL_TOKEN_ID
          server-password: CENTRAL_TOKEN_SECRET
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Build and Deploy
        working-directory: ${{ github.event.inputs.workingDir }}
        run: mvn -B -Pmaven-central deploy
        env:
          CENTRAL_TOKEN_ID: ${{ secrets.CENTRAL_TOKEN_ID }}
          CENTRAL_TOKEN_SECRET: ${{ secrets.CENTRAL_TOKEN_SECRET }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          GNUPGHOME: ${{ env.GNUPGHOME }}

